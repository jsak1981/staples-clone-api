# ===================================================================
# APPLICATION SETTINGS
# ===================================================================
# Defines the name of the application, used in logging and monitoring.
spring.application.name=staples-clone


# ===================================================================
# DATA SOURCES CONFIGURATION
# ===================================================================
# --- PostgreSQL Main DataSource ---
# The JDBC URL for the primary PostgreSQL database.
spring.datasource.url=jdbc:postgresql://localhost:5432/staples_db
# The username for the PostgreSQL database connection.
spring.datasource.username=postgres
# The password for the PostgreSQL database connection.
spring.datasource.password=Testing123

# --- MongoDB DataSource ---
# The connection string for the MongoDB database, including the database name.
spring.data.mongodb.uri=mongodb://localhost:27017/staplesNOSQLDB

# for better debugging --- #\d+ products


# ===================================================================
# JWT (JSON WEB TOKEN) CONFIGURATION
# ===================================================================
# A strong, long, and random secret key for signing JWTs. In production, this should be an environment variable.
jwt.secret=aVeryLongAndSecureSecretKeyThatIsAtLeast256BitsLongForHS256
# The expiration time for the JWT in milliseconds (e.g., 3600000 = 1 hour).
jwt.expiration.ms=3600000

# ===================================================================
# JPA & HIBERNATE CONFIGURATION
# ===================================================================
# Strategy for schema management: 'validate' checks schema against entities on startup.
spring.jpa.hibernate.ddl-auto=validate
# The default database schema for Hibernate to use for all entities.
spring.jpa.properties.hibernate.default_schema=staples
# If true, Hibernate will generate and print SQL statements to the console.
spring.jpa.show-sql=true
# If true, formats the printed SQL to be multi-line and more readable.
spring.jpa.properties.hibernate.format_sql=true


# ===================================================================
# SPRING BATCH CONFIGURATION
# ===================================================================
# Strategy for initializing Spring Batch meta-data tables; 'never' assumes they exist.
spring.batch.jdbc.initialize-schema=never
# If false, prevents Spring Batch jobs from running automatically on application startup.
spring.batch.job.enabled=false


# ===================================================================
# DATA INITIALIZATION CONFIGURATION (data.sql)
# ===================================================================
# Strategy for running SQL scripts; 'never' disables automatic script execution.
spring.sql.init.mode=never
# If true, ensures data.sql runs AFTER Hibernate's schema management (ddl-auto).
spring.jpa.defer-datasource-initialization=true
# Explicitly specifies the location of the data initialization script.
spring.sql.init.data-locations=classpath:data.sql


# ===================================================================
# HIKARICP CONNECTION POOL CONFIGURATION
# ===================================================================
# Specifies the connection pool implementation to use; HikariCP is the default and recommended.
spring.datasource.type=com.zaxxer.hikari.HikariDataSource
# The maximum number of database connections the pool can hold.
spring.datasource.hikari.maximum-pool-size=15
# The minimum number of idle connections to maintain in the pool for responsiveness.
spring.datasource.hikari.minimum-idle=15
# The maximum time (ms) the application will wait for a connection from the pool.
spring.datasource.hikari.connection-timeout=30000
# The maximum time (ms) a connection can be idle in the pool before being retired.
spring.datasource.hikari.idle-timeout=600000
# The maximum lifetime (ms) of any connection in the pool.
spring.datasource.hikari.max-lifetime=1800000
# The name of the connection pool, useful for logging and monitoring.
spring.datasource.hikari.pool-name=StaplesClone-HikariCP
# A simple query to test the validity of connections before they are given to the application.
spring.datasource.hikari.connection-test-query=SELECT 1


# ===================================================================
# LOGGING CONFIGURATION
# ===================================================================
# Sets the logging level for Hibernate to INFO, reducing excessive startup noise.
logging.level.org.hibernate=INFO
# Sets the logging level to TRACE for Hibernate's SQL type descriptor, showing bound parameter values.
logging.level.org.hibernate.type.descriptor.sql=TRACE


