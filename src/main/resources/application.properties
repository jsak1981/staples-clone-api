spring.application.name=staples-clone

# PostgreSQL Database Connection Settings
spring.datasource.url=jdbc:postgresql://localhost:5432/staples_db
spring.datasource.username=postgres
spring.datasource.password=Testing123
spring.datasource.driver-class-name=org.postgresql.Driver

spring.batch.jdbc.initialize-schema=always

# JPA/Hibernate Settings
# Use 'validate' to ensure the schema matches entities without changing it.
spring.jpa.hibernate.ddl-auto=validate

# Specify the default schema to use for all entities.
spring.jpa.properties.hibernate.default_schema=staples

# Improve naming strategy for mapping snake_case (db) to camelCase (Java).
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# for better debugging --- #\d+ products
# Show the SQL statements that Hibernate generates
spring.jpa.show-sql=true
# Format the SQL to be multi-line and readable
spring.jpa.properties.hibernate.format_sql=true

# Set the logging level for all Hibernate operations to DEBUG
# This will show the full stack trace of the underlying database exception
logging.level.org.hibernate=DEBUG
# 4. Specifically show values being bound to prepared statements (very useful)
logging.level.org.hibernate.type.descriptor.sql=TRACE

# A strong, long, and random secret key for signing JWTs
jwt.secret=aVeryLongAndSecureSecretKeyThatIsAtLeast256BitsLongForHS256
# Token validity in milliseconds (e.g., 1 hour)
jwt.expiration.ms=3600000

# ===================================================================
# HikariCP Connection Pool Production-Grade Configuration
# ===================================================================
# Explicitly set the connection pool type (best practice)
spring.datasource.type=com.zaxxer.hikari.HikariDataSource

# --- Core Pool Sizing ---
# The maximum number of connections in the pool. This is the most critical tuning parameter.
# A good starting point for a high-throughput API is around 10-20.
spring.datasource.hikari.maximum-pool-size=15
# The minimum number of idle connections to maintain. Setting this to the same as max-pool-size
# creates a fixed-size pool, which is often best for performance.
spring.datasource.hikari.minimum-idle=15

# --- Timeouts and Liveness ---
# How long (in milliseconds) a client will wait for a connection from the pool.
# If the pool is exhausted, requests will fail after this time. 30 seconds is a common value.
spring.datasource.hikari.connection-timeout=30000
# How long (in milliseconds) a connection can be idle before it is retired.
# Should be lower than any database or network timeout. 10 minutes is a safe value.
spring.datasource.hikari.idle-timeout=600000
# The maximum lifetime of a connection in the pool (in milliseconds). When a connection
# reaches this age, it will be retired. This prevents stale connections with firewalls or the DB.
# 30 minutes is a common, robust value.
spring.datasource.hikari.max-lifetime=1800000

# --- Diagnostics and Behavior ---
# A name for the connection pool, which will appear in logs and monitoring tools.
spring.datasource.hikari.pool-name=StaplesClone-HikariCP
# How often (in milliseconds) Hikari will test the health of idle connections.
spring.datasource.hikari.keepalive-time=200000
# A simple query to test the validity of a connection.
spring.datasource.hikari.connection-test-query=SELECT 1
# Detects and logs connection leaks. A value of 2000ms is good for development
# to find slow queries holding onto connections for too long.
spring.datasource.hikari.leak-detection-threshold=2000

# ===================================================================
# PostgreSQL JDBC Driver-Specific Optimizations
# ===================================================================
# These properties are passed directly to the PostgreSQL driver for performance tuning.
spring.datasource.hikari.data-source-properties.cachePrepStmts=true
spring.datasource.hikari.data-source-properties.prepStmtCacheSize=250
spring.datasource.hikari.data-source-properties.prepStmtCacheSqlLimit=2048
spring.datasource.hikari.data-source-properties.useServerPrepStmts=true
